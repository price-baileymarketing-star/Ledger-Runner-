<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ledger Runner | Price Bailey</title>
  <meta name="description" content="Ledger Runner – the Price Bailey arcade game. Collect financial symbols, grow your receipt, and escape through the tunnels!" />

  <!-- PWA manifest (create manifest.json separately) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <!-- Howler.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
    }
    #gameCanvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      cursor: pointer;
      border: 2px solid #00ff88;
      box-shadow: 0 0 30px rgba(0,255,136,0.3);
    }
    #hint {
      margin-top: 10px;
      color: #444;
      font-size: 13px;
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="hint">Arrow keys or swipe · Collect symbols · Use tunnels to wrap · Walls = death</div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const CELL = 20;
const COLS = 40;
const ROWS = 28;
const HEADER_H = 48;
const W = COLS * CELL;   // 800
const H = ROWS * CELL;   // 560

// Tunnel: rows 11–17 (centre of left/right walls)
const TUNNEL_ROW_START = 11;
const TUNNEL_ROW_END   = 17;

const SYMBOLS = [
  { char: "£", color: "#cc44ff", glow: "#aa00ff", pts: 10 },
  { char: "$", color: "#00dd44", glow: "#00aa22", pts: 10 },
  { char: "€", color: "#4488ff", glow: "#2255dd", pts: 10 },
  { char: "%", color: "#ffdd00", glow: "#cc9900", pts: 15 },
  { char: "+", color: "#44aaff", glow: "#2277cc", pts: 15 },
  { char: "=", color: "#ff4444", glow: "#cc1111", pts: 15 },
  { char: "▲", color: "#00ffcc", glow: "#00ccaa", pts: 50, graph: true },
];

const TX_LINES = [
  "SALE  £  42.00", "VAT 20%  £  7.00", "NET   £  35.00",
  "REF: INV-00291", "DATE: 14/05/26  ", "SUBTOTAL £49.99",
  "DISC   -£ 5.00", "TOTAL  £  44.99", "CASH   £  50.00",
  "CHANGE £   5.01","CLIENT: ACME LTD", "TAX CODE: 20STD",
  "LEDGER RUNNER  ", "AUDIT REF: 0042 ",
];

// ─────────────────────────────────────────────
//  AUDIO  — replace URLs with your GitHub paths
// ─────────────────────────────────────────────
let sounds = null;
let audioUnlocked = false;

function initSounds() {
  sounds = {
    sfxCollect:  new Howl({ src: ["assets/collect.mp3"],  volume: 0.6 }),
    sfxPowerUp:  new Howl({ src: ["assets/powerup.mp3"],  volume: 0.7 }),
    sfxTunnel:   new Howl({ src: ["assets/tunnel.mp3"],   volume: 0.5 }),
    sfxGameOver: new Howl({ src: ["assets/gameover.mp3"], volume: 0.8 }),
  };
}

function unlockAudio() {
  if (audioUnlocked || !window.Howler) return;
  Howler.ctx && Howler.ctx.resume();
  audioUnlocked = true;
}

function play(name) {
  if (sounds && sounds[name]) {
    try { sounds[name].play(); } catch(e) {}
  }
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function inTunnel(y) {
  return y >= TUNNEL_ROW_START && y <= TUNNEL_ROW_END;
}

function initSnake() {
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  return [{ x: cx, y: cy }, { x: cx-1, y: cy }, { x: cx-2, y: cy }];
}

function randFood(snake) {
  let pos;
  do {
    pos = {
      x: 3 + Math.floor(Math.random() * (COLS - 6)),
      y: 1 + Math.floor(Math.random() * (ROWS - 2)),
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  const sym = Math.random() < 0.12
    ? SYMBOLS[6]
    : SYMBOLS[Math.floor(Math.random() * 6)];
  return { ...pos, ...sym, id: Math.random() };
}

function initFood(snake) {
  return Array.from({ length: 8 }, () => randFood(snake));
}

// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
let state = {
  snake: initSnake(),
  dir: { x: 1, y: 0 },
  nextDir: { x: 1, y: 0 },
  food: [],
  score: 0,
  length: 3,
  phase: "start",   // "start" | "playing" | "dead"
  multiplier: 1,
  particles: [],
  touchStart: null,
  frameCount: 0,
};

function startGame() {
  unlockAudio();
  const snake = initSnake();
  state = {
    snake,
    dir: { x: 1, y: 0 },
    nextDir: { x: 1, y: 0 },
    food: initFood(snake),
    score: 0,
    length: 3,
    phase: "playing",
    multiplier: 1,
    particles: [],
    touchStart: null,
    frameCount: state.frameCount,
  };
}

// ─────────────────────────────────────────────
//  GAME TICK
// ─────────────────────────────────────────────
function tick() {
  if (state.phase !== "playing") return;

  state.dir = { ...state.nextDir };
  const head = state.snake[0];
  let nx = head.x + state.dir.x;
  let ny = head.y + state.dir.y;

  // Top/bottom death
  if (ny < 0 || ny >= ROWS) {
    state.phase = "dead";
    play("sfxGameOver");
    return;
  }

  // Left/right: tunnel wraps, else death
  if (nx < 0) {
    if (inTunnel(ny)) { nx = COLS - 1; play("sfxTunnel"); }
    else { state.phase = "dead"; play("sfxGameOver"); return; }
  } else if (nx >= COLS) {
    if (inTunnel(ny)) { nx = 0; play("sfxTunnel"); }
    else { state.phase = "dead"; play("sfxGameOver"); return; }
  }

  // Self collision
  if (state.snake.slice(0, -1).some(s => s.x === nx && s.y === ny)) {
    state.phase = "dead";
    play("sfxGameOver");
    return;
  }

  const newHead = { x: nx, y: ny };
  const ateIdx  = state.food.findIndex(f => f.x === nx && f.y === ny);

  if (ateIdx !== -1) {
    const eaten  = state.food[ateIdx];
    const gained = Math.round(eaten.pts * state.multiplier);
    state.score     += gained;
    state.length    += eaten.graph ? 5 : 1;
    state.multiplier = 1 + Math.floor(state.length / 10) * 0.1;
    state.food.splice(ateIdx, 1);
    state.food.push(randFood(state.snake));
    if (state.food.length < 8) state.food.push(randFood(state.snake));

    play(eaten.graph ? "sfxPowerUp" : "sfxCollect");

    // Spawn particles
    for (let i = 0; i < 6; i++) {
      state.particles.push({
        x: nx * CELL + CELL/2 + (Math.random()-0.5)*30,
        y: ny * CELL + CELL/2 + (Math.random()-0.5)*30,
        char: eaten.char === "▲" ? "+" : eaten.char,
        color: eaten.color,
        life: 30, maxLife: 30,
        size: 10 + Math.random() * 8,
        vx: (Math.random()-0.5)*3,
        vy: -1 - Math.random()*2,
      });
    }
    state.snake = [newHead, ...state.snake];
  } else {
    state.snake = [newHead, ...state.snake.slice(0, -1)];
  }

  // Age particles
  state.particles = state.particles
    .map(p => ({ ...p, x: p.x+p.vx, y: p.y+p.vy, life: p.life-1 }))
    .filter(p => p.life > 0);
}

// ─────────────────────────────────────────────
//  DRAWING
// ─────────────────────────────────────────────
const canvas = document.getElementById("gameCanvas");
const ctx    = canvas.getContext("2d");

// Responsive sizing — fill screen preserving aspect ratio
function resize() {
  const ratio  = (W) / (H + HEADER_H);
  let cw = window.innerWidth;
  let ch = window.innerHeight - 36; // leave room for hint
  if (cw / ch > ratio) cw = ch * ratio;
  else ch = cw / ratio;
  canvas.style.width  = cw + "px";
  canvas.style.height = ch + "px";
}
canvas.width  = W;
canvas.height = H + HEADER_H;
resize();
window.addEventListener("resize", resize);

// ── Background ──
function drawBg() {
  ctx.fillStyle = "#7a4a1e";
  ctx.fillRect(0, 0, W, H);
  const grains = ["#8b5523","#7a4518","#6e3f16","#9a5f2a","#c47b35"];
  for (let i = 0; i < 18; i++) {
    const y = (i/18)*H + Math.sin(i*1.3)*10;
    ctx.strokeStyle = grains[i % grains.length];
    ctx.lineWidth   = 8 + (i%3)*4;
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.bezierCurveTo(W*0.3, y+Math.sin(i)*20, W*0.7, y-Math.sin(i*0.7)*15, W, y+10);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Coffee ring easter egg
  ctx.save();
  ctx.translate(W*0.72, H*0.78);
  const cg = ctx.createRadialGradient(0,0,28, 0,0,42);
  cg.addColorStop(0,    "rgba(0,0,0,0)");
  cg.addColorStop(0.7,  "rgba(0,0,0,0)");
  cg.addColorStop(0.85, "rgba(80,40,10,0.18)");
  cg.addColorStop(1,    "rgba(80,40,10,0)");
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.ellipse(0,0,44,38,0.2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Notebook paper TL
  ctx.save(); ctx.translate(8,12); ctx.rotate(-0.08);
  ctx.fillStyle = "rgba(255,255,240,0.82)";
  ctx.strokeStyle = "rgba(180,180,160,0.5)"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(0,0,90,70,3); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = "rgba(160,200,255,0.5)"; ctx.lineWidth = 0.8;
  for (let l=1;l<6;l++){ctx.beginPath();ctx.moveTo(6,l*11);ctx.lineTo(84,l*11);ctx.stroke();}
  ctx.strokeStyle="rgba(255,100,100,0.4)"; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(18,70);ctx.stroke();
  ctx.restore();

  // Notebook paper BR
  ctx.save(); ctx.translate(W-75, H-60); ctx.rotate(0.06);
  ctx.fillStyle="rgba(255,255,240,0.7)";
  ctx.strokeStyle="rgba(180,180,160,0.4)"; ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(0,0,70,52,3);ctx.fill();ctx.stroke();
  ctx.strokeStyle="rgba(160,200,255,0.4)"; ctx.lineWidth=0.8;
  for(let l=1;l<5;l++){ctx.beginPath();ctx.moveTo(4,l*10);ctx.lineTo(66,l*10);ctx.stroke();}
  ctx.restore();
}

// ── Pen ──
function drawPen() {
  const tx=18, ty=78, angle=0.15, PL=210, R=6;
  ctx.save(); ctx.translate(tx,ty); ctx.rotate(angle);

  // Shadow
  ctx.save(); ctx.translate(3,4);
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.beginPath(); ctx.ellipse(PL/2,0,PL/2,R+2,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Barrel
  const bg=ctx.createLinearGradient(0,-R,0,R);
  bg.addColorStop(0,"#3a4f80"); bg.addColorStop(0.25,"#1e2e55");
  bg.addColorStop(0.6,"#111d3a"); bg.addColorStop(1,"#080e1e");
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.roundRect(0,-R,PL-18,R*2,[R,2,2,R]); ctx.fill();

  // Highlight
  ctx.strokeStyle="rgba(100,130,200,0.3)"; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(6,-R+1.5);ctx.lineTo(PL-22,-R+1.5);ctx.stroke();

  // Clip
  ctx.fillStyle="#b0bcc8";
  ctx.beginPath();ctx.roundRect(4,-R-4,PL-80,4,2);ctx.fill();
  ctx.fillStyle="#d0dce8";
  ctx.beginPath();ctx.arc(4,-R-2,4,0,Math.PI*2);ctx.fill();

  // Logo band
  ctx.fillStyle="#f5f5f5"; ctx.fillRect(60,-R,60,R*2);
  ctx.fillStyle="#008B8B"; ctx.fillRect(60,-R,25,R*2);
  ctx.strokeStyle="rgba(0,0,0,0.6)"; ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(72.5,-R+1);ctx.lineTo(72.5,R-1);ctx.stroke();
  ctx.fillStyle="#000"; ctx.font="italic bold 8px Georgia,serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("p",66,0); ctx.fillText("b",79,0);
  ctx.fillStyle="#111"; ctx.font="bold 4.5px Arial,sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText("Price Bailey",88,-1.5);
  ctx.font="3.5px Arial,sans-serif";
  ctx.fillText("CHARTERED ACCOUNTANTS",88,3.5);
  ctx.strokeStyle="rgba(0,0,0,0.2)"; ctx.lineWidth=0.5;
  ctx.strokeRect(60,-R,60,R*2);

  // Grip
  const gg=ctx.createLinearGradient(0,-R,0,R);
  gg.addColorStop(0,"#1c1c28");gg.addColorStop(0.5,"#28283a");gg.addColorStop(1,"#0e0e18");
  ctx.fillStyle=gg;
  ctx.beginPath();ctx.roundRect(PL-50,-R+1,26,(R-1)*2,2);ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,0.08)"; ctx.lineWidth=1;
  for(let g=0;g<6;g++){ctx.beginPath();ctx.moveTo(PL-48+g*4,-R+2);ctx.lineTo(PL-48+g*4,R-2);ctx.stroke();}

  // Collar
  const cg2=ctx.createLinearGradient(0,-R,0,R);
  cg2.addColorStop(0,"#ccd4dc");cg2.addColorStop(0.5,"#8890a0");cg2.addColorStop(1,"#585f6a");
  ctx.fillStyle=cg2;
  ctx.beginPath();ctx.roundRect(PL-24,-R+1,8,(R-1)*2,1);ctx.fill();

  // Nib
  ctx.fillStyle="#70787e";
  ctx.beginPath();ctx.moveTo(PL-16,-R+2);ctx.lineTo(PL-16,R-2);ctx.lineTo(PL-2,1.5);ctx.lineTo(PL-2,-1.5);ctx.closePath();ctx.fill();
  ctx.fillStyle="rgba(210,220,230,0.45)";
  ctx.beginPath();ctx.moveTo(PL-16,-R+2);ctx.lineTo(PL-2,-1.5);ctx.lineTo(PL-16,-1);ctx.closePath();ctx.fill();
  ctx.fillStyle="#999";
  ctx.beginPath();ctx.arc(PL-2,0,1.5,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

// ── Tunnels ──
function drawTunnels(frame) {
  const pulse    = 0.6 + 0.4*Math.sin(frame*0.07);
  const tunnelY1 = TUNNEL_ROW_START * CELL;
  const tunnelY2 = (TUNNEL_ROW_END+1) * CELL;
  const midY     = (tunnelY1+tunnelY2)/2;
  const tH       = tunnelY2-tunnelY1;

  [0, W].forEach((tx) => {
    ctx.save(); ctx.translate(tx, midY);

    // Recess
    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.beginPath();ctx.ellipse(0,0,52,tH/2+8,0,0,Math.PI*2);ctx.fill();

    // Outer glow
    const og=ctx.createRadialGradient(0,0,tH/2-10,0,0,tH/2+30);
    og.addColorStop(0,`rgba(0,200,255,${0.5*pulse})`);
    og.addColorStop(0.5,`rgba(0,120,255,${0.25*pulse})`);
    og.addColorStop(1,"rgba(0,50,200,0)");
    ctx.fillStyle=og;
    ctx.beginPath();ctx.ellipse(0,0,70,tH/2+30,0,0,Math.PI*2);ctx.fill();

    // Swirl rings
    for(let r=3;r>=0;r--){
      const ri=r/3;
      ctx.strokeStyle=`rgba(${Math.round(ri*100)},${Math.round(180+ri*75)},255,${(0.15+ri*0.4)*pulse})`;
      ctx.lineWidth=3-r*0.5;
      ctx.beginPath();
      ctx.ellipse(0,0,(tH/2-4)*(0.3+ri*0.7),(tH/2-4)*(0.3+ri*0.7)*0.55,frame*0.02*(r%2===0?1:-1),0,Math.PI*2);
      ctx.stroke();
    }

    // Rim
    ctx.strokeStyle=`rgba(0,220,255,${0.9*pulse})`; ctx.lineWidth=4;
    ctx.shadowColor="rgba(0,200,255,0.9)"; ctx.shadowBlur=16;
    ctx.beginPath();ctx.ellipse(0,0,46,tH/2,0,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.strokeStyle=`rgba(180,240,255,${0.6*pulse})`; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(0,0,38,tH/2-8,0,0,Math.PI*2);ctx.stroke();

    // Label
    const lx = tx===0 ? 58 : -58;
    ctx.fillStyle=`rgba(0,220,255,${0.85*pulse})`;
    ctx.font="bold 10px 'Courier New',monospace"; ctx.textAlign="center";
    ctx.shadowColor="rgba(0,200,255,0.8)"; ctx.shadowBlur=6;
    ctx.fillText("ESCAPE",lx,-8); ctx.fillText("TUNNEL",lx,8);
    ctx.shadowBlur=0;

    ctx.restore();
  });
}

// ── Wall hazard stripes ──
function drawWalls() {
  const stripes=["#ff4400","#ffcc00"];
  for(let row=0;row<ROWS;row++){
    if(inTunnel(row)) continue;
    const yy=row*CELL;
    ctx.globalAlpha=0.5;
    ctx.fillStyle=stripes[row%2];
    ctx.fillRect(0,yy,6,CELL);
    ctx.fillRect(W-6,yy,6,CELL);
  }
  ctx.globalAlpha=1;
  ctx.fillStyle="rgba(255,60,0,0.55)";
  ctx.fillRect(0,0,W,4); ctx.fillRect(0,H-4,W,4);
}

// ── Snake (receipt strip) ──
function drawSnake(snake) {
  if (!snake.length) return;
  const SW=CELL-1, SH=CELL-1;

  snake.forEach((seg,i) => {
    const px=seg.x*CELL, py=seg.y*CELL;
    const isHead=i===0, isTail=i===snake.length-1;
    const age=i/Math.max(snake.length,1);

    ctx.save();
    const paper=`rgb(${Math.round(252-age*8)},${Math.round(250-age*6)},${Math.round(240-age*10)})`;
    ctx.fillStyle=paper;

    if(isHead){
      ctx.beginPath();ctx.roundRect(px+0.5,py+0.5,SW,SH,[5,5,1,1]);ctx.fill();
      ctx.fillStyle="#1a1a1a"; ctx.fillRect(px+0.5,py+0.5,SW,7);
      ctx.fillStyle="#fff"; ctx.font="bold 5px monospace"; ctx.textAlign="center";
      ctx.fillText("★ PRICE BAILEY ★",px+SW/2,py+6);
      ctx.strokeStyle="#aaa"; ctx.lineWidth=0.5; ctx.setLineDash([2,2]);
      ctx.beginPath();ctx.moveTo(px+2,py+8.5);ctx.lineTo(px+SW-2,py+8.5);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle="#222"; ctx.font="4px monospace"; ctx.textAlign="left";
      ctx.fillText("RECEIPT",px+3,py+13);
      ctx.fillText("#"+String(Math.floor(snake.length*7+291)).padStart(5,"0"),px+3,py+18);
    } else if(isTail){
      ctx.beginPath();
      ctx.moveTo(px+0.5,py+0.5); ctx.lineTo(px+SW-0.5,py+0.5);
      const segs=6, segW=SW/segs;
      ctx.lineTo(px+SW-0.5,py+SH-3);
      for(let t=segs;t>=0;t--){
        const tx2=px+0.5+t*segW;
        ctx.lineTo(tx2,py+SH-3+(t%2===0?3:0));
      }
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillRect(px+0.5,py+0.5,SW,SH);
    }

    // Transaction text
    if(!isHead&&!isTail){
      const line=TX_LINES[i%TX_LINES.length];
      ctx.fillStyle=`rgba(20,20,20,${Math.min(0.55+age*0.3,0.85)})`;
      ctx.font=`${age>0.6?"bold ":""}4px monospace`;
      ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(line,px+2,py+SH/2);
    }

    // Perforations
    if(!isHead){
      ctx.strokeStyle="rgba(160,150,140,0.7)"; ctx.lineWidth=0.8; ctx.setLineDash([1.5,2]);
      ctx.beginPath();ctx.moveTo(px+1,py+0.5);ctx.lineTo(px+SW-1,py+0.5);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Edge shading
    ctx.fillStyle="rgba(0,0,0,0.06)";
    ctx.fillRect(px+0.5,py+0.5,1.5,SH);
    ctx.fillRect(px+SW-1.5,py+0.5,1.5,SH);

    ctx.restore();
  });
}

// ── Food ──
function drawFood(food, frame) {
  food.forEach(f => {
    const px=f.x*CELL+CELL/2, py=f.y*CELL+CELL/2;
    const bob=Math.sin(frame*0.08+f.id*10)*2;
    const pulse=0.85+0.15*Math.sin(frame*0.1+f.id*5);
    ctx.save(); ctx.translate(px,py+bob);
    if(f.graph){
      ctx.shadowColor=f.glow; ctx.shadowBlur=12*pulse;
      ctx.strokeStyle=f.color; ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(-8,6);ctx.lineTo(-3,0);ctx.lineTo(2,3);ctx.lineTo(8,-8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(5,-8);ctx.lineTo(8,-8);ctx.lineTo(8,-5);ctx.stroke();
      ctx.strokeStyle="rgba(0,255,180,0.4)"; ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-10,8);ctx.lineTo(-10,-10);ctx.moveTo(-10,8);ctx.lineTo(10,8);ctx.stroke();
    } else {
      ctx.shadowColor=f.glow; ctx.shadowBlur=10*pulse;
      ctx.fillStyle=f.color; ctx.font=`bold ${CELL-4}px monospace`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(f.char,0,0);
    }
    ctx.restore();
  });
}

// ── Particles ──
function drawParticles(particles) {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.font=`bold ${p.size}px monospace`;
    ctx.textAlign="center";
    ctx.fillText(p.char,p.x,p.y);
    ctx.restore();
  });
}

// ── Header ──
function drawHeader(score, length) {
  ctx.fillStyle="#0a0a0a"; ctx.fillRect(0,0,W,HEADER_H);
  ctx.strokeStyle="#00ff88"; ctx.lineWidth=2; ctx.strokeRect(0,0,W,HEADER_H);
  ctx.fillStyle="rgba(0,255,100,0.03)";
  for(let sl=0;sl<HEADER_H;sl+=3) ctx.fillRect(0,sl,W,1);
  ctx.fillStyle="#00ff88"; ctx.font="bold 16px 'Courier New',monospace"; ctx.textAlign="left";
  ctx.fillText(`SCORE: ${score.toLocaleString()}`,12,30);
  ctx.fillStyle="#fff"; ctx.font="bold 20px 'Courier New',monospace"; ctx.textAlign="center";
  ctx.fillText("LEDGER RUNNER",W/2,30);
  ctx.fillStyle="#00ff88"; ctx.font="bold 16px 'Courier New',monospace"; ctx.textAlign="right";
  ctx.fillText(`LENGTH: ${length}`,W-12,30);
}

// ── Overlays ──
function drawStart() {
  ctx.fillStyle="rgba(0,0,0,0.6)"; ctx.fillRect(0,HEADER_H,W,H);
  ctx.fillStyle="#00ff88"; ctx.font="bold 32px 'Courier New',monospace"; ctx.textAlign="center";
  ctx.fillText("LEDGER RUNNER",W/2,H/2-40+HEADER_H);
  ctx.fillStyle="#aaffcc"; ctx.font="14px 'Courier New',monospace";
  ctx.fillText("Use the ESCAPE TUNNELS (centre left/right) to wrap around.",W/2,H/2+HEADER_H);
  ctx.fillStyle="#ff6644"; ctx.font="13px 'Courier New',monospace";
  ctx.fillText("Hit the walls elsewhere → GAME OVER",W/2,H/2+22+HEADER_H);
  ctx.fillStyle="#ffdd00"; ctx.font="bold 20px 'Courier New',monospace";
  ctx.fillText("TAP or press any key to start",W/2,H/2+56+HEADER_H);
}

function drawDead() {
  ctx.fillStyle="rgba(0,0,0,0.75)"; ctx.fillRect(0,HEADER_H,W,H);
  ctx.fillStyle="#0d1117"; ctx.strokeStyle="#ff4444"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(W/2-190,H/2-95+HEADER_H,380,230,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#ff4444"; ctx.font="bold 28px 'Courier New',monospace"; ctx.textAlign="center";
  ctx.fillText("AUDIT COMPLETE",W/2,H/2-55+HEADER_H);
  ctx.fillStyle="#888"; ctx.font="14px 'Courier New',monospace";
  ctx.fillText("The ledger has been balanced.",W/2,H/2-25+HEADER_H);
  ctx.fillStyle="#00ff88"; ctx.font="bold 20px 'Courier New',monospace";
  ctx.fillText(`FINAL SCORE: ${state.score.toLocaleString()}`,W/2,H/2+15+HEADER_H);
  ctx.fillStyle="#ffdd00"; ctx.font="14px 'Courier New',monospace";
  ctx.fillText(`Receipt Length: ${state.length}`,W/2,H/2+42+HEADER_H);
  // Restart button
  ctx.fillStyle="#00ff88";
  ctx.beginPath(); ctx.roundRect(W/2-80,H/2+68+HEADER_H,160,40,6); ctx.fill();
  ctx.fillStyle="#0a0a0a"; ctx.font="bold 16px 'Courier New',monospace";
  ctx.fillText("RESTART",W/2,H/2+94+HEADER_H);

  // CTA button
  ctx.fillStyle="#1a2540";
  ctx.strokeStyle="#4488ff"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(W/2-160,H/2+118+HEADER_H,320,40,6); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#4488ff"; ctx.font="bold 13px 'Courier New',monospace";
  ctx.fillText("💬 Talk to the Price Bailey team →",W/2,H/2+144+HEADER_H);
}

// ─────────────────────────────────────────────
//  RENDER LOOP
// ─────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H+HEADER_H);
  ctx.save(); ctx.translate(0,HEADER_H);
  drawBg();
  drawWalls();
  drawTunnels(state.frameCount);
  drawFood(state.food, state.frameCount);
  drawSnake(state.snake);
  drawParticles(state.particles);
  drawPen();
  ctx.restore();
  drawHeader(state.score, state.length);

  if(state.phase==="start") drawStart();
  if(state.phase==="dead")  drawDead();

  // Touch control hint overlay (tablets)
  if(state.phase === "playing") drawTouchHints();

  // Tap ripples (touch feedback)
  drawTapRipples();

  state.frameCount++;
  requestAnimationFrame(render);
}

function drawTapRipples() {
  tapRipples = tapRipples.filter(r => r.life > 0);
  tapRipples.forEach(r => {
    const t = 1 - r.life / r.maxLife;
    const radius = 10 + t * 60;
    const alpha = (1 - t) * 0.6;
    ctx.save();
    ctx.strokeStyle = `rgba(0,255,180,${alpha})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
    ctx.stroke();
    // Inner solid dot
    ctx.fillStyle = `rgba(180,255,220,${alpha * 1.2})`;
    ctx.beginPath();
    ctx.arc(r.x, r.y, 4 + t * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    r.life--;
  });
}

function drawTouchHints() {
  const d = state.dir;
  const TOP = HEADER_H;
  const pulse = 0.5 + 0.5 * Math.sin(state.frameCount * 0.05);

  ctx.save();

  // Split the playfield into two tap halves with a divider line
  const horizontal = d.x !== 0; // moving left or right → split into TOP/BOTTOM halves
  const midX = W / 2;
  const midY = TOP + H / 2;

  // Divider line (animated dashes)
  ctx.strokeStyle = `rgba(0,220,255,${0.25 + 0.15 * pulse})`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 8]);
  ctx.lineDashOffset = -state.frameCount * 0.3;
  ctx.beginPath();
  if (horizontal) {
    ctx.moveTo(0, midY);
    ctx.lineTo(W, midY);
  } else {
    ctx.moveTo(midX, TOP);
    ctx.lineTo(midX, TOP + H);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Determine the two resulting directions for each half
  let zoneA, zoneB;
  if (d.x === 1) {
    // moving right
    zoneA = { rect: [0, TOP, W, H/2],            arrow: "↑", label: "TAP TOP" };
    zoneB = { rect: [0, TOP + H/2, W, H/2],      arrow: "↓", label: "TAP BOTTOM" };
  } else if (d.x === -1) {
    // moving left
    zoneA = { rect: [0, TOP, W, H/2],            arrow: "↑", label: "TAP TOP" };
    zoneB = { rect: [0, TOP + H/2, W, H/2],      arrow: "↓", label: "TAP BOTTOM" };
  } else if (d.y === -1) {
    // moving up
    zoneA = { rect: [0, TOP, W/2, H],            arrow: "←", label: "TAP LEFT" };
    zoneB = { rect: [W/2, TOP, W/2, H],          arrow: "→", label: "TAP RIGHT" };
  } else {
    // moving down — mirrored (tap left → snake turns RIGHT relative to world)
    zoneA = { rect: [0, TOP, W/2, H],            arrow: "→", label: "TAP LEFT" };
    zoneB = { rect: [W/2, TOP, W/2, H],          arrow: "←", label: "TAP RIGHT" };
  }

  // Draw big translucent arrows in each zone — anchored at the OUTER edge
  // so they don't crowd the centre where gameplay happens
  const drawArrow = (zone, anchor) => {
    const [zx, zy, zw, zh] = zone.rect;
    let ax, ay;
    if (anchor === "top")    { ax = zx + zw/2; ay = zy + 50; }
    if (anchor === "bottom") { ax = zx + zw/2; ay = zy + zh - 50; }
    if (anchor === "left")   { ax = zx + 60;   ay = zy + zh/2; }
    if (anchor === "right")  { ax = zx + zw - 60; ay = zy + zh/2; }

    // Glow background circle
    ctx.fillStyle = `rgba(0,220,255,${0.06 + 0.04 * pulse})`;
    ctx.beginPath();
    ctx.arc(ax, ay, 42, 0, Math.PI * 2);
    ctx.fill();

    // Arrow ring
    ctx.strokeStyle = `rgba(0,220,255,${0.4 + 0.2 * pulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ax, ay, 34, 0, Math.PI * 2);
    ctx.stroke();

    // Arrow glyph
    ctx.fillStyle = `rgba(180,240,255,${0.85 + 0.15 * pulse})`;
    ctx.shadowColor = "rgba(0,220,255,0.8)";
    ctx.shadowBlur = 12;
    ctx.font = "bold 42px Arial, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(zone.arrow, ax, ay);
    ctx.shadowBlur = 0;

    // Label under the circle
    ctx.fillStyle = `rgba(0,220,255,0.75)`;
    ctx.font = "bold 10px 'Courier New', monospace";
    ctx.fillText(zone.label, ax, ay + 56);
  };

  if (horizontal) {
    drawArrow(zoneA, "top");
    drawArrow(zoneB, "bottom");
  } else {
    drawArrow(zoneA, "left");
    drawArrow(zoneB, "right");
  }

  ctx.restore();
}

// ─────────────────────────────────────────────
//  GAME LOOP TICK (120ms)
// ─────────────────────────────────────────────
setInterval(tick, 120);

// ─────────────────────────────────────────────
//  INPUT — KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if(state.phase==="start"||state.phase==="dead"){ startGame(); return; }
  if(e.key==="ArrowUp"    && state.dir.y!== 1) state.nextDir={x:0,y:-1};
  if(e.key==="ArrowDown"  && state.dir.y!==-1) state.nextDir={x:0,y: 1};
  if(e.key==="ArrowLeft"  && state.dir.x!== 1) state.nextDir={x:-1,y:0};
  if(e.key==="ArrowRight" && state.dir.x!==-1) state.nextDir={x: 1,y:0};
});

// ─────────────────────────────────────────────
//  INPUT — TOUCH
// ─────────────────────────────────────────────
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  state.touchStart={ x:e.touches[0].clientX, y:e.touches[0].clientY };
  if(state.phase==="start"||state.phase==="dead") startGame();
}, { passive: false });

let tapRipples = [];

canvas.addEventListener("touchend", e => {
  e.preventDefault();
  if(!state.touchStart||state.phase!=="playing") return;
  const dx=e.changedTouches[0].clientX-state.touchStart.x;
  const dy=e.changedTouches[0].clientY-state.touchStart.y;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  const SWIPE_THRESHOLD = 18;

  if(ax > SWIPE_THRESHOLD || ay > SWIPE_THRESHOLD){
    if(ax>ay){
      if(dx>0&&state.dir.x!==-1) state.nextDir={x:1,y:0};
      else if(dx<0&&state.dir.x!==1) state.nextDir={x:-1,y:0};
    } else {
      if(dy>0&&state.dir.y!==-1) state.nextDir={x:0,y:1};
      else if(dy<0&&state.dir.y!==1) state.nextDir={x:0,y:-1};
    }
  } else {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W/rect.width, scaleY=(H+HEADER_H)/rect.height;
    const tapX = (e.changedTouches[0].clientX - rect.left) * scaleX;
    const tapY = (e.changedTouches[0].clientY - rect.top) * scaleY;
    const halfW = W / 2;
    const halfH = (H + HEADER_H) / 2;
    const tapRight = tapX > halfW;
    const tapBottom = tapY > halfH;

    // Spawn ripple at tap location for visual feedback
    tapRipples.push({ x: tapX, y: tapY, life: 24, maxLife: 24 });

    const d = state.dir;
    if(d.x === 1){
      state.nextDir = tapBottom ? {x:0,y:1} : {x:0,y:-1};
    } else if(d.x === -1){
      state.nextDir = tapBottom ? {x:0,y:1} : {x:0,y:-1};
    } else if(d.y === -1){
      state.nextDir = tapRight ? {x:1,y:0} : {x:-1,y:0};
    } else if(d.y === 1){
      state.nextDir = tapRight ? {x:-1,y:0} : {x:1,y:0};
    }
  }
  state.touchStart=null;
}, { passive: false });

// ─────────────────────────────────────────────
//  INPUT — CLICK (restart button)
// ─────────────────────────────────────────────
canvas.addEventListener("click", e => {
  if(state.phase==="start"){ startGame(); return; }
  if(state.phase==="dead"){
    const rect=canvas.getBoundingClientRect();
    const scaleX=W/rect.width, scaleY=(H+HEADER_H)/rect.height;
    const cx=(e.clientX-rect.left)*scaleX;
    const cy=(e.clientY-rect.top)*scaleY;
    // Restart button
    const bx=W/2-80, by=H/2+68+HEADER_H;
    if(cx>=bx&&cx<=bx+160&&cy>=by&&cy<=by+40){ startGame(); return; }
    // CTA button
    const ctax=W/2-160, ctay=H/2+118+HEADER_H;
    if(cx>=ctax&&cx<=ctax+320&&cy>=ctay&&cy<=ctay+40){
      window.open("https://www.pricebailey.co.uk/enquiry-form/","_blank","noopener,noreferrer");
    }
  }
});

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
state.food = initFood(state.snake);
initSounds();
render();
</script>
</body>
